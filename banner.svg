<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    /* === ANIMATIONS === */

    /* Water tile shimmer */
    .water-bg { animation: wShim 4s ease-in-out infinite; }
    @keyframes wShim { 0%,100%{opacity:0.92} 50%{opacity:1} }

    /* Clouds */
    .cloud-a { animation: cA 22s linear infinite; }
    .cloud-b { animation: cB 30s linear infinite; }
    @keyframes cA { from{transform:translateX(0)} to{transform:translateX(-960px)} }
    @keyframes cB { from{transform:translateX(280px)} to{transform:translateX(-680px)} }

    /* Trees sway */
    .tr1{animation:sw1 4.2s ease-in-out infinite;transform-origin:90px 108px}
    .tr2{animation:sw2 5.1s ease-in-out infinite;transform-origin:168px 104px}
    .tr3{animation:sw1 3.8s ease-in-out infinite;transform-origin:730px 106px}
    .tr4{animation:sw2 4.8s ease-in-out infinite;transform-origin:808px 102px}
    @keyframes sw1{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
    @keyframes sw2{0%,100%{transform:rotate(2deg)}50%{transform:rotate(-2.5deg)}}

    /* Sunflower nod */
    .sf1{animation:nod 3.2s ease-in-out infinite;transform-origin:338px 126px}
    .sf2{animation:nod 3.2s ease-in-out 0.9s infinite;transform-origin:372px 122px}
    @keyframes nod{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

    /* Bush bounce */
    .bs1{animation:bb 3.5s ease-in-out infinite;transform-origin:490px 136px}
    .bs2{animation:bb 3.5s ease-in-out 0.7s infinite;transform-origin:520px 134px}
    @keyframes bb{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.06) scaleX(0.97)}}

    /* Player bob + tool swing cycle */
    .player{animation:pbob 1.4s ease-in-out infinite;transform-origin:450px 148px}
    @keyframes pbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .tool{animation:tswing 1.4s ease-in-out infinite;transform-origin:454px 144px}
    @keyframes tswing{0%,100%{transform:rotate(-25deg)}50%{transform:rotate(15deg)}}

    /* House smoke */
    .sm1{animation:smoke 2.8s ease-out infinite;transform-origin:558px 48px}
    .sm2{animation:smoke 2.8s ease-out 1s infinite;transform-origin:558px 48px}
    .sm3{animation:smoke 2.8s ease-out 1.9s infinite;transform-origin:558px 48px}
    @keyframes smoke{
      0%  {transform:translate(0,0) scale(0.4);opacity:0.7}
      100%{transform:translate(-10px,-38px) scale(2);opacity:0}
    }

    /* Water lily drift */
    .lily{animation:ldrift 5s ease-in-out infinite;transform-origin:648px 160px}
    @keyframes ldrift{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

    /* Birds */
    .birds{animation:bfly 16s linear infinite}
    @keyframes bfly{
      0%  {transform:translate(0,0);opacity:0}
      4%  {opacity:1}
      96% {opacity:1}
      100%{transform:translate(-960px,-25px);opacity:0}
    }

    /* Title glow pulse */
    .title{animation:tglow 3.5s ease-in-out infinite}
    @keyframes tglow{
      0%,100%{fill:#1e5c0a;filter:drop-shadow(0 3px 0 rgba(255,255,255,0.9))}
      50%    {fill:#2e8012;filter:drop-shadow(0 3px 6px rgba(100,220,50,0.6))}
    }
    .sub{animation:sfade 5s ease-in-out infinite}
    @keyframes sfade{0%,100%{opacity:0.7}50%{opacity:1}}

    /* Fence sway subtle */
    .fence{animation:fsway 6s ease-in-out infinite;transform-origin:300px 155px}
    @keyframes fsway{0%,100%{transform:rotate(0)}50%{transform:rotate(0.4deg)}}
  </style>

  <!-- Water tile pattern -->
  <pattern id="wp" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
    <rect width="16" height="16" fill="#78c8b8"/>
    <rect x="3" y="5"  width="10" height="2" rx="1" fill="#68b4a6" opacity="0.7"/>
    <rect x="1" y="10" width="7"  height="2" rx="1" fill="#68b4a6" opacity="0.5"/>
    <rect x="9" y="12" width="5"  height="2" rx="1" fill="#68b4a6" opacity="0.5"/>
  </pattern>

  <!-- Grass pattern -->
  <pattern id="gp" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#a8d870"/>
    <rect x="0" y="0" width="1" height="1" fill="#90c058" opacity="0.6"/>
    <rect x="4" y="3" width="1" height="1" fill="#90c058" opacity="0.6"/>
    <rect x="2" y="6" width="1" height="1" fill="#b8e080" opacity="0.5"/>
  </pattern>

  <!-- Brick floor pattern (house) -->
  <pattern id="brick" x="0" y="0" width="16" height="8" patternUnits="userSpaceOnUse">
    <rect width="16" height="8" fill="#e8d8a8"/>
    <rect x="0"  y="0" width="7"  height="3" rx="0" fill="#f0e0b0" opacity="0.6"/>
    <rect x="9"  y="0" width="7"  height="3" rx="0" fill="#f0e0b0" opacity="0.6"/>
    <rect x="4"  y="4" width="8"  height="3" rx="0" fill="#f0e0b0" opacity="0.6"/>
    <line x1="0" y1="3" x2="16" y2="3" stroke="#d0c090" stroke-width="0.5"/>
    <line x1="0" y1="7" x2="16" y2="7" stroke="#d0c090" stroke-width="0.5"/>
  </pattern>
</defs>

